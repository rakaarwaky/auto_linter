[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "auto-linter"
version = "1.0.0"
description = "MCP server for autonomous linting and governance auditing"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]",
    "fastmcp",
    "pydantic",
    "ruff",
    "mypy",
    "pyre-check",
    "click",
    "watchdog",
    "httpx>=0.27.0",  # For DesktopCommander integration
]

[project.scripts]
auto-linter = "surfaces.mcp_server_entry:main"
auto-lint = "surfaces.cli_main_entry:cli"

[tool.setuptools.packages.find]
where = ["src"]
include = ["agent", "capabilities", "infrastructure", "surfaces", "taxonomy"]
exclude = ["tests*"]
namespaces = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
