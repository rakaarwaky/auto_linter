thresholds:
  score: 90.0
  complexity: 10
  max_file_lines: 500
adapters:
- name: ruff
  weight: 1.0
- name: mypy
  weight: 1.0
- name: bandit
  weight: 1.0
- name: radon
  weight: 1.0
- name: governance
  weight: 2.0
layer_map:
  agent: src/agent
  capabilities: src/capabilities
  surfaces: src/surfaces
  taxonomy: src/taxonomy
  infrastructure: src/infrastructure
governance_rules:
- from: surfaces
  to: infrastructure
  description: Surface layer must not import Infrastructure directly. Use Capabilities
    instead.
- from: capabilities
  to: infrastructure
  description: Capabilities layer must not import Infrastructure directly. Use Taxonomy/Interfaces
    instead.
- from: taxonomy
  to: agent
  description: Taxonomy must be pure and not import from the Agent layer.
- from: infrastructure
  to: surfaces
  description: Infrastructure should not depend on Surface implementations.
ignored_rules:
- E501
